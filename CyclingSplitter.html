<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cycling Splitter</title>
<style>
:root {
  --bg: #f4f1eb;
  --card: #ffffff;
  --border: #ddd9d0;
  --text: #1a1a18;
  --muted: #6b6760;
  --accent: #2d6a4f;
  --accent-dark: #1f4f3a;
  --accent-light: #e8f4f0;
  --danger: #c0392b;
  --danger-light: #fdf0ee;
  --warn-bg: #fef6ea;
  --warn-text: #b7650a;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 16px; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 90px; }

.header { background: var(--accent); color: #fff; padding: 20px 16px 16px; }
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.header .sub { font-size: 13px; opacity: 0.75; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.nav button { flex: 1; padding: 11px 2px; background: none; border: none; font-size: 12px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
.nav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

.screen { display: none; padding: 16px; }
.screen.active { display: block; }

.next-pay { background: var(--accent); color: #fff; border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.next-pay .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
.next-pay .nm { font-size: 34px; font-weight: 700; margin: 4px 0 2px; letter-spacing: -0.5px; }
.next-pay .det { font-size: 13px; opacity: 0.8; }

.sec { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin: 20px 0 8px; }

.bal-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.bal-name { font-weight: 500; font-size: 15px; }
.bal-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
.bal-net { font-size: 17px; font-weight: 600; }
.pos { color: var(--accent); }
.neg { color: var(--danger); }
.zero { color: var(--muted); }

.cost-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
.cost-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.cost-desc { font-weight: 500; font-size: 15px; flex: 1; }
.cost-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.cost-amt { font-size: 16px; font-weight: 600; color: var(--accent); }
.cost-meta { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.6; }
.btn-del { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
.btn-del:active { background: var(--danger-light); color: var(--danger); }

.settle-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.settle-from { font-size: 15px; font-weight: 500; }
.settle-to { font-size: 13px; color: var(--muted); margin-top: 2px; }
.settle-amt { font-size: 22px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.all-square { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 15px; }

.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
input[type=text], input[type=number], input[type=date], select {
  width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 16px; background: var(--card); color: var(--text);
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

.check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ck-lbl { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; cursor: pointer; font-size: 15px; }
.ck-lbl.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dark); font-weight: 500; }
.ck-lbl input { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }

.person-row { display: flex; gap: 8px; margin-bottom: 8px; }
.person-row input { flex: 1; }
.btn-icon { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 14px; font-size: 20px; cursor: pointer; color: var(--muted); height: 46px; }
.btn-icon:active { background: var(--danger-light); color: var(--danger); }

.btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-primary:active { background: var(--accent-dark); }
.btn-primary:disabled { opacity: 0.5; }
.btn-secondary { width: 100%; padding: 12px; background: none; color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-row .btn-secondary { margin-top: 0; }

.info-box { padding: 14px; background: var(--warn-bg); border-radius: var(--radius-sm); font-size: 13px; color: var(--warn-text); line-height: 1.6; margin-top: 16px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 11px 20px; border-radius: 24px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }
.empty { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; line-height: 1.6; }

.export-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-top: 16px; }
.export-box p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>🚴 Cycling Splitter</h1>
  <div class="sub" id="hdr-sub">Loading...</div>
</div>

<nav class="nav">
  <button class="active" onclick="show('dash')">Dashboard</button>
  <button onclick="show('add')">Add Cost</button>
  <button onclick="show('costs')">Costs</button>
  <button onclick="show('settle')">Settle</button>
  <button onclick="show('setup')">Setup</button>
</nav>

<div id="s-dash" class="screen active">
  <div id="dash-inner"></div>
</div>

<div id="s-add" class="screen">
  <div class="form-group">
    <label>Date</label>
    <input type="date" id="f-date">
  </div>
  <div class="form-group">
    <label>Description</label>
    <input type="text" id="f-desc" placeholder="e.g. Dinner in Siena" autocomplete="off">
  </div>
  <div class="form-group">
    <label>Amount (A$) — actual bank amount</label>
    <input type="number" id="f-amt" placeholder="0.00" step="0.01" inputmode="decimal">
  </div>
  <div class="form-group">
    <label>Paid by</label>
    <select id="f-paidby"></select>
  </div>
  <div class="form-group">
    <label>Split among</label>
    <div class="check-grid" id="f-split"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="checkAll(true)">All in</button>
      <button class="btn-secondary" onclick="checkAll(false)">Clear</button>
    </div>
  </div>
  <button class="btn-primary" id="btn-save" onclick="saveCost()">Save cost</button>
</div>

<div id="s-costs" class="screen">
  <div id="costs-inner"></div>
</div>

<div id="s-settle" class="screen">
  <div id="settle-inner"></div>
</div>

<div id="s-setup" class="screen">
  <div id="setup-inner"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Storage ──────────────────────────────────────────────────
var STORE_KEY = 'cycling_splitter_v1';

function load() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { people: [], costs: [] };
}

function save(state) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch(e) {
    toast('Storage error — data may not have saved');
  }
}

var S = load();

// ── Calculations ─────────────────────────────────────────────

function calcBalances() {
  var paid = {}, owed = {};
  S.people.forEach(function(p) { paid[p] = 0; owed[p] = 0; });
  S.costs.forEach(function(c) {
    if (paid[c.paidBy] !== undefined) paid[c.paidBy] += c.amount;
    if (c.split && c.split.length > 0) {
      var share = c.amount / c.split.length;
      c.split.forEach(function(p) { if (owed[p] !== undefined) owed[p] += share; });
    }
  });
  return S.people.map(function(p) {
    return { name: p, paid: paid[p], owed: owed[p], net: paid[p] - owed[p] };
  }).sort(function(a,b) { return a.net - b.net; });
}

function calcSettlement(balances) {
  var debtors = [], creditors = [];
  balances.forEach(function(b) {
    var n = Math.round(b.net * 100) / 100;
    if (n < -0.005) debtors.push({ name: b.name, amt: -n });
    else if (n > 0.005) creditors.push({ name: b.name, amt: n });
  });
  debtors.sort(function(a,b){ return b.amt - a.amt; });
  creditors.sort(function(a,b){ return b.amt - a.amt; });
  var txns = [], di = 0, ci = 0;
  while (di < debtors.length && ci < creditors.length) {
    var amt = Math.round(Math.min(debtors[di].amt, creditors[ci].amt) * 100) / 100;
    txns.push({ from: debtors[di].name, to: creditors[ci].name, amt: amt });
    debtors[di].amt = Math.round((debtors[di].amt - amt) * 100) / 100;
    creditors[ci].amt = Math.round((creditors[ci].amt - amt) * 100) / 100;
    if (debtors[di].amt < 0.005) di++;
    if (creditors[ci].amt < 0.005) ci++;
  }
  return txns;
}

// ── Render ───────────────────────────────────────────────────

function renderAll() {
  renderDash();
  renderAddForm();
  renderCosts();
  renderSettle();
  renderSetup();
  document.getElementById('hdr-sub').textContent = S.people.length > 0
    ? S.people.join(' · ')
    : 'Go to Setup to add your group';
}

function renderDash() {
  if (S.people.length === 0) {
    document.getElementById('dash-inner').innerHTML =
      '<div class="empty">No group set up yet.<br>Tap Setup to add your riders.</div>';
    return;
  }
  var bal = calcBalances();
  var next = bal[0];
  var deficit = Math.abs(next.net);
  var det = S.costs.length === 0
    ? 'No costs yet — they go first!'
    : 'Behind by A$' + deficit.toFixed(2) + ' · paid A$' + next.paid.toFixed(2) + ', owes A$' + next.owed.toFixed(2);

  var h = '<div class="next-pay">'
    + '<div class="lbl">Next to pay</div>'
    + '<div class="nm">' + esc(next.name) + '</div>'
    + '<div class="det">' + det + '</div>'
    + '</div>';

  h += '<div class="sec">Balances</div>';
  bal.forEach(function(b) {
    var cls = b.net > 0.005 ? 'pos' : b.net < -0.005 ? 'neg' : 'zero';
    h += '<div class="bal-card">'
      + '<div><div class="bal-name">' + esc(b.name) + '</div>'
      + '<div class="bal-detail">Paid A$' + b.paid.toFixed(2) + ' · Owes A$' + b.owed.toFixed(2) + '</div></div>'
      + '<div class="bal-net ' + cls + '">' + (b.net >= 0 ? '+' : '') + 'A$' + b.net.toFixed(2) + '</div>'
      + '</div>';
  });
  document.getElementById('dash-inner').innerHTML = h;
}

function renderAddForm() {
  var sel = document.getElementById('f-paidby');
  sel.innerHTML = S.people.map(function(p) {
    return '<option value="' + esc(p) + '">' + esc(p) + '</option>';
  }).join('');
  if (S.people.length > 0 && S.costs.length > 0) {
    sel.value = calcBalances()[0].name;
  }
  document.getElementById('f-split').innerHTML = S.people.map(function(p) {
    return '<label class="ck-lbl on">'
      + '<input type="checkbox" value="' + esc(p) + '" checked onchange="toggleCk(this)">'
      + esc(p) + '</label>';
  }).join('');
}

function renderCosts() {
  if (S.costs.length === 0) {
    document.getElementById('costs-inner').innerHTML = '<div class="empty">No costs yet.</div>';
    return;
  }
  var total = S.costs.reduce(function(s,c){ return s + c.amount; }, 0);
  var h = '<div class="sec">' + S.costs.length + ' cost' + (S.costs.length !== 1 ? 's' : '') + ' · Total A$' + total.toFixed(2) + '</div>';
  S.costs.slice().reverse().forEach(function(c, ri) {
    var realIdx = S.costs.length - 1 - ri;
    var perHead = c.split && c.split.length > 0 ? (c.amount / c.split.length).toFixed(2) : '0.00';
    h += '<div class="cost-item">'
      + '<div class="cost-top">'
      + '<div class="cost-desc">' + esc(c.desc) + '</div>'
      + '<div class="cost-right">'
      + '<div class="cost-amt">A$' + c.amount.toFixed(2) + '</div>'
      + '<button class="btn-del" onclick="deleteCost(' + realIdx + ')">×</button>'
      + '</div></div>'
      + '<div class="cost-meta">'
      + esc(c.paidBy) + ' paid · A$' + perHead + '/person<br>'
      + esc((c.split || []).join(', '))
      + (c.date ? ' · ' + esc(c.date) : '')
      + '</div></div>';
  });
  document.getElementById('costs-inner').innerHTML = h;
}

function renderSettle() {
  if (S.people.length === 0) {
    document.getElementById('settle-inner').innerHTML = '<div class="empty">Set up your group first.</div>';
    return;
  }
  var bal = calcBalances();
  var txns = calcSettlement(bal);
  var h = '<div class="sec">Who pays who</div>';
  if (txns.length === 0) {
    h += '<div class="all-square">✅ Everyone is square!</div>';
  } else {
    txns.forEach(function(t) {
      h += '<div class="settle-item">'
        + '<div><div class="settle-from">' + esc(t.from) + '</div>'
        + '<div class="settle-to">pays → ' + esc(t.to) + '</div></div>'
        + '<div class="settle-amt">A$' + t.amt.toFixed(2) + '</div>'
        + '</div>';
    });
  }
  h += '<div class="sec" style="margin-top:24px">Full summary</div>';
  bal.forEach(function(b) {
    var cls = b.net > 0.005 ? 'pos' : b.net < -0.005 ? 'neg' : 'zero';
    h += '<div class="bal-card">'
      + '<div><div class="bal-name">' + esc(b.name) + '</div>'
      + '<div class="bal-detail">Paid A$' + b.paid.toFixed(2) + ' · Owes A$' + b.owed.toFixed(2) + '</div></div>'
      + '<div class="bal-net ' + cls + '">' + (b.net >= 0 ? '+' : '') + 'A$' + b.net.toFixed(2) + '</div>'
      + '</div>';
  });
  document.getElementById('settle-inner').innerHTML = h;
}

function renderSetup() {
  var names = S.people.length > 0 ? S.people : ['','','','',''];
  var h = '<div class="sec">Group members</div><div id="people-rows">';
  names.forEach(function(n, i) {
    h += '<div class="person-row">'
      + '<input type="text" placeholder="Name ' + (i+1) + '" value="' + esc(n) + '">'
      + '<button class="btn-icon" onclick="this.parentElement.remove()">×</button>'
      + '</div>';
  });
  h += '</div>'
    + '<button class="btn-secondary" onclick="addRow()">+ Add person</button>'
    + '<button class="btn-primary" onclick="saveGroup()">Save group</button>'
    + '<div class="info-box">⚠️ Set names before the trip. Changing names after costs are entered will break the calculations.</div>'
    + '<div class="export-box">'
    + '<p>Back up to spreadsheet — tap to copy all data as CSV, then paste into your Google Sheet.</p>'
    + '<button class="btn-secondary" style="margin-top:0" onclick="copyCSV()">Copy CSV backup</button>'
    + '</div>'
    + '<div class="export-box" style="margin-top:0">'
    + '<p style="color:var(--danger);"><strong>Danger zone</strong> — wipe all data and start fresh.</p>'
    + '<button class="btn-secondary" style="margin-top:0;color:var(--danger);border-color:var(--danger)" onclick="resetAll()">Reset everything</button>'
    + '</div>';
  document.getElementById('setup-inner').innerHTML = h;
}

// ── Actions ──────────────────────────────────────────────────

function saveCost() {
  var date = document.getElementById('f-date').value;
  var desc = document.getElementById('f-desc').value.trim();
  var amount = parseFloat(document.getElementById('f-amt').value);
  var paidBy = document.getElementById('f-paidby').value;
  var split = Array.from(document.querySelectorAll('#f-split input:checked')).map(function(cb){ return cb.value; });
  if (!desc) { toast('Enter a description'); return; }
  if (!amount || amount <= 0) { toast('Enter a valid amount'); return; }
  if (!paidBy) { toast('Select who paid'); return; }
  if (split.length === 0) { toast('Select at least one person to split among'); return; }
  S.costs.push({ date: date, desc: desc, amount: amount, paidBy: paidBy, split: split });
  save(S);
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amt').value = '';
  renderAll();
  toast('Cost saved!');
  show('dash');
}

function deleteCost(idx) {
  if (!confirm('Delete "' + S.costs[idx].desc + '"?')) return;
  S.costs.splice(idx, 1);
  save(S);
  renderAll();
  toast('Deleted');
}

function saveGroup() {
  var inputs = document.querySelectorAll('#people-rows input');
  var names = Array.from(inputs).map(function(i){ return i.value.trim(); }).filter(Boolean);
  if (names.length === 0) { toast('Enter at least one name'); return; }
  S.people = names;
  save(S);
  renderAll();
  toast('Group saved!');
}

function addRow() {
  var rows = document.getElementById('people-rows');
  var div = document.createElement('div');
  div.className = 'person-row';
  div.innerHTML = '<input type="text" placeholder="Name ' + (rows.children.length + 1) + '">'
    + '<button class="btn-icon" onclick="this.parentElement.remove()">×</button>';
  rows.appendChild(div);
  div.querySelector('input').focus();
}

function toggleCk(cb) {
  cb.parentElement.classList.toggle('on', cb.checked);
}

function checkAll(val) {
  document.querySelectorAll('#f-split input').forEach(function(cb) {
    cb.checked = val;
    toggleCk(cb);
  });
}

function copyCSV() {
  var lines = ['Date,Description,Amount (AUD),Paid By,Split Among'];
  S.costs.forEach(function(c) {
    lines.push([
      c.date,
      '"' + (c.desc || '').replace(/"/g, '""') + '"',
      c.amount.toFixed(2),
      '"' + (c.paidBy || '').replace(/"/g, '""') + '"',
      '"' + (c.split || []).join(', ').replace(/"/g, '""') + '"'
    ].join(','));
  });
  var csv = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(csv).then(function() {
      toast('CSV copied! Paste into your spreadsheet.');
    }).catch(function() { fallbackCopy(csv); });
  } else {
    fallbackCopy(csv);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    toast('CSV copied! Paste into your spreadsheet.');
  } catch(e) {
    toast('Copy failed — try a different browser');
  }
  document.body.removeChild(ta);
}

function resetAll() {
  if (!confirm('Delete ALL people and costs? This cannot be undone.')) return;
  if (!confirm('Are you sure? All data will be lost.')) return;
  S = { people: [], costs: [] };
  save(S);
  renderAll();
  toast('Reset complete');
}

// ── Nav ──────────────────────────────────────────────────────

function show(name) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('s-' + name).classList.add('active');
  var tabs = ['dash','add','costs','settle','setup'];
  document.querySelectorAll('.nav button')[tabs.indexOf(name)].classList.add('active');
  if (name === 'add') renderAddForm();
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Set today's date & render ────────────────────────────────
(function() {
  var d = new Date();
  document.getElementById('f-date').value = d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
  renderAll();
  if (S.people.length === 0) show('setup');
})();
</script>
</body>
</html>
